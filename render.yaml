# JSgame · Render deploy config.
# 1 web service (Node) que serve dist/client estático + APIs + Socket.io.
#
# PERSISTÊNCIA: usa Turso (SQLite distribuído, free 9GB / 500 dbs).
# Setup Turso (1x):
#   1. Cria conta grátis em https://turso.tech
#   2. CLI: `turso db create jsgame` → pega URL
#   3. CLI: `turso db tokens create jsgame` → pega token
#   4. No painel Render, set TURSO_DATABASE_URL + TURSO_AUTH_TOKEN (encrypted)
#
# Sem Turso env vars setadas, server usa SQLite local (file:.run-data/jsgame.db).
# Dados zeram em redeploy nesse caso. Com Turso, persistência real.
#
# Setup no painel Render (após criar a partir desse YAML):
# 1. Defina GROQ_API_KEY, TURSO_DATABASE_URL, TURSO_AUTH_TOKEN (encrypted).
# 2. Build vai rodar `npm ci --include=dev && npm run build`.
# 3. Start: `npm start` (tsx em prod — sem build TS separado).

services:
  - type: web
    name: jsgame
    runtime: node
    plan: free
    region: oregon
    branch: main
    # vite + typescript + tsx em dependencies (não devDeps) pra Render
    # free conseguir achar mesmo com NODE_ENV=production. Só vitest fica em
    # devDeps (não roda em prod).
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVER_PORT
        value: 10000
      - key: GROQ_API_KEY
        sync: false   # define manualmente no painel — fica encrypted
      - key: DM_PROVIDER
        value: groq
      - key: TURSO_DATABASE_URL
        sync: false   # libsql://xxx.turso.io — pega na CLI Turso
      - key: TURSO_AUTH_TOKEN
        sync: false   # JWT do turso db tokens create — encrypted
