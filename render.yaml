# JSgame · Render deploy config.
# 1 web service (Node) que serve dist/client estático + APIs + Socket.io.
# Disco persistente em /var/data pra SQLite.
#
# Setup no painel Render (após criar a partir desse YAML):
# 1. Defina GROQ_API_KEY (encrypted) — eles guardam fora do repo.
# 2. Build vai rodar `npm install && npm run build`.
# 3. Start: `npm start` (tsx em prod — sem build TS separado).

services:
  - type: web
    name: jsgame
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVER_PORT
        value: 10000
      - key: DATA_DIR
        value: /var/data
      - key: GROQ_API_KEY
        sync: false   # define manualmente no painel — fica encrypted
      - key: DM_PROVIDER
        value: groq
    disk:
      name: jsgame-data
      mountPath: /var/data
      sizeGB: 1
