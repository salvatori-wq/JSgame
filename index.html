<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#5a3a1a" />
    <meta name="description" content="JSgame — D&D 5e online com Mestre IA. Crie seu personagem, junte 3 amigos, viva uma sessão de 30 minutos." />
    <title>JSgame — D&D Online</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <!-- Sprint Φ.5 — Tipografia D&D autêntica.
         Cinzel = headers (small caps livros oficiais).
         Cardo = body serif próximo a Bookman/Garamond dos livros.
         font-display: swap pra evitar FOIT — fallback Georgia desde o início. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cardo:ital,wght@0,400;0,700;1,400&display=swap"
    />
    <link rel="stylesheet" href="/src/client/styles.css" />
  </head>
  <body>
    <div id="app">
      <div class="boot-splash">
        <h1>JSGAME</h1>
        <!-- Round 3 fix (Mariana DM) — "multiverso" é Marvel-speak, não D&D.
             "Convocando o Mestre" mantém pegada de mesa. -->
        <p class="boot-tagline">Convocando o Mestre…</p>
      </div>
    </div>
    <script type="module" src="/src/client/main.ts"></script>
  </body>
</html>
